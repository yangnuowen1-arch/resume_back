basePath: /api/v1
definitions:
  dto.AssignJobMemberRequest:
    properties:
      memberRole:
        type: string
      userId:
        type: integer
    required:
    - memberRole
    - userId
    type: object
  dto.AssignUserRolesRequest:
    properties:
      roles:
        items:
          type: string
        type: array
    required:
    - roles
    type: object
  dto.BatchAnalyzeCandidatesRequest:
    properties:
      candidateIds:
        items:
          type: integer
        type: array
      jobId:
        type: integer
    required:
    - candidateIds
    type: object
  dto.BindJobTagsRequest:
    properties:
      tagIds:
        items:
          type: integer
        type: array
    required:
    - tagIds
    type: object
  dto.CreateApplicationRequest:
    properties:
      candidateId:
        type: integer
      jobId:
        type: integer
      remark:
        type: string
      resumeId:
        type: integer
      source:
        type: string
      status:
        type: string
    required:
    - jobId
    - resumeId
    type: object
  dto.CreateCandidateRequest:
    properties:
      currentCompany:
        type: string
      currentJobId:
        type: integer
      currentPosition:
        type: string
      currentPositionCategory:
        type: string
      email:
        type: string
      gender:
        type: string
      highestEducation:
        type: string
      location:
        type: string
      major:
        type: string
      name:
        type: string
      phone:
        type: string
      positionCategoryId:
        type: integer
      school:
        type: string
      source:
        type: string
      status:
        type: string
      yearsOfExperience:
        type: number
    required:
    - name
    type: object
  dto.CreateJobCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - name
    type: object
  dto.CreateJobRequest:
    properties:
      bonusPoints:
        type: string
      categoryId:
        type: integer
      description:
        type: string
      dynamicFields:
        type: object
      experienceMax:
        type: integer
      experienceMin:
        type: integer
      headcount:
        type: integer
      ownerUserId:
        type: integer
      priority:
        type: string
      requirements:
        type: string
      responsibilities:
        type: string
      salaryMax:
        type: integer
      salaryMin:
        type: integer
      salaryMonths:
        type: integer
      status:
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        type: string
    required:
    - title
    type: object
  dto.CreateTagGroupRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - name
    type: object
  dto.CreateTagRequest:
    properties:
      color:
        type: string
      groupId:
        type: integer
      name:
        type: string
      status:
        type: string
    required:
    - name
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      phone:
        maxLength: 30
        type: string
      realName:
        maxLength: 50
        type: string
      roles:
        items:
          type: string
        type: array
      status:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.LoginRequest:
    properties:
      account:
        type: string
      password:
        type: string
    required:
    - account
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      phone:
        maxLength: 30
        type: string
      realName:
        maxLength: 50
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  dto.RequirementEvidence:
    properties:
      end:
        type: integer
      start:
        type: integer
      text:
        type: string
    type: object
  dto.ResumeResponse:
    properties:
      candidateId:
        type: integer
      candidateName:
        type: string
      createdAt:
        type: string
      fileKey:
        type: string
      fileSize:
        type: integer
      fileType:
        type: string
      fileUrl:
        type: string
      id:
        type: integer
      language:
        type: string
      originalFilename:
        type: string
      parseError:
        type: string
      parseStatus:
        type: string
      parsedAt:
        type: string
      parsedData:
        type: string
      rawText:
        type: string
      updatedAt:
        type: string
      uploadBy:
        type: integer
      uploadedAt:
        type: string
    type: object
  dto.RunResumeScreeningRequest:
    properties:
      jobId:
        type: integer
      outputLanguage:
        type: string
      resumeId:
        type: integer
    required:
    - jobId
    - resumeId
    type: object
  dto.ScreeningAssessmentSection:
    properties:
      matchLevel:
        type: string
      recommendation:
        type: string
      score:
        type: number
    type: object
  dto.ScreeningCandidateAnalysisSection:
    properties:
      risks:
        items:
          type: string
        type: array
      strengths:
        items:
          type: string
        type: array
      suggestedInterviewQuestions:
        items:
          type: string
        type: array
      weaknesses:
        items:
          type: string
        type: array
    type: object
  dto.ScreeningCandidateInfoSection:
    properties:
      appliedPosition:
        type: string
      currentTitle:
        type: string
      highestEducation:
        type: string
      name:
        type: string
      taskErrorMessage:
        type: string
      taskStatus:
        type: string
      yearsOfExperience:
        type: number
    type: object
  dto.ScreeningFallbackSection:
    properties:
      markdownReport:
        type: string
      shouldUseMarkdownFallback:
        type: boolean
    type: object
  dto.ScreeningFinalRecommendationSection:
    properties:
      recommendation:
        type: string
      text:
        type: string
    type: object
  dto.ScreeningRequirement:
    properties:
      candidateSituation:
        type: string
      comment:
        type: string
      evidence:
        items:
          $ref: '#/definitions/dto.RequirementEvidence'
        type: array
      id:
        type: string
      label:
        type: string
      status:
        type: string
    type: object
  dto.ScreeningRequirementsComparisonSection:
    properties:
      attentionItems:
        items:
          $ref: '#/definitions/dto.ScreeningRequirement'
        type: array
      items:
        items:
          $ref: '#/definitions/dto.ScreeningRequirement'
        type: array
      matchedItems:
        items:
          $ref: '#/definitions/dto.ScreeningRequirement'
        type: array
    type: object
  dto.ScreeningResumeSection:
    properties:
      highlightAvailable:
        type: boolean
      text:
        type: string
      textAvailable:
        type: boolean
    type: object
  dto.ScreeningSummarySection:
    properties:
      text:
        type: string
    type: object
  dto.ScreeningTaskDetailResponse:
    properties:
      aiScore:
        type: number
      candidateName:
        type: string
      errorMessage:
        type: string
      id:
        type: integer
      markdownReport:
        type: string
      matchLevel:
        type: string
      position:
        type: string
      recommendation:
        type: string
      requirements:
        items:
          $ref: '#/definitions/dto.ScreeningRequirement'
        type: array
      resumeText:
        type: string
      sections:
        allOf:
        - $ref: '#/definitions/dto.ScreeningTaskDetailSections'
        description: Sections 是详情页的新主数据源；保留上方平铺字段以兼容已发布的前端。
      status:
        type: string
      summary:
        type: string
    type: object
  dto.ScreeningTaskDetailSections:
    properties:
      assessment:
        $ref: '#/definitions/dto.ScreeningAssessmentSection'
      candidateAnalysis:
        $ref: '#/definitions/dto.ScreeningCandidateAnalysisSection'
      candidateInfo:
        $ref: '#/definitions/dto.ScreeningCandidateInfoSection'
      fallback:
        $ref: '#/definitions/dto.ScreeningFallbackSection'
      finalRecommendation:
        $ref: '#/definitions/dto.ScreeningFinalRecommendationSection'
      requirementsComparison:
        $ref: '#/definitions/dto.ScreeningRequirementsComparisonSection'
      resume:
        $ref: '#/definitions/dto.ScreeningResumeSection'
      summary:
        $ref: '#/definitions/dto.ScreeningSummarySection'
    type: object
  dto.UpdateCandidateRequest:
    properties:
      currentCompany:
        type: string
      currentJobId:
        type: integer
      currentPosition:
        type: string
      currentPositionCategory:
        type: string
      email:
        type: string
      gender:
        type: string
      highestEducation:
        type: string
      location:
        type: string
      major:
        type: string
      name:
        type: string
      phone:
        type: string
      positionCategoryId:
        type: integer
      school:
        type: string
      source:
        type: string
      status:
        type: string
      yearsOfExperience:
        type: number
    required:
    - name
    - status
    type: object
  dto.UpdateJobCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - name
    - status
    type: object
  dto.UpdateJobRequest:
    properties:
      bonusPoints:
        type: string
      categoryId:
        type: integer
      description:
        type: string
      dynamicFields:
        type: object
      experienceMax:
        type: integer
      experienceMin:
        type: integer
      headcount:
        type: integer
      ownerUserId:
        type: integer
      priority:
        type: string
      requirements:
        type: string
      responsibilities:
        type: string
      salaryMax:
        type: integer
      salaryMin:
        type: integer
      salaryMonths:
        type: integer
      status:
        type: string
      tagIds:
        items:
          type: integer
        type: array
      title:
        type: string
    required:
    - priority
    - status
    - title
    type: object
  dto.UpdateTagGroupRequest:
    properties:
      description:
        type: string
      name:
        type: string
      status:
        type: string
    required:
    - name
    - status
    type: object
  dto.UpdateTagRequest:
    properties:
      color:
        type: string
      groupId:
        type: integer
      name:
        type: string
      status:
        type: string
    required:
    - name
    - status
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        maxLength: 100
        type: string
      phone:
        maxLength: 30
        type: string
      realName:
        maxLength: 50
        type: string
      status:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - status
    - username
    type: object
  dto.UploadResumeResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.ResumeResponse'
      message:
        type: string
      requestId:
        type: string
      timestamp:
        type: string
    type: object
  response.APIResponse:
    properties:
      code:
        type: integer
      data:
        description: interface{} → 这个字段类型不固定，啥都能放
      error:
        description: omitempty → 如果没值就别出现在 JSON 里，别占位置
      message:
        type: string
      requestId:
        type: string
      timestamp:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: AI 智能简历筛选系统后端接口文档
  title: AI Resume Screening API
  version: "1.0"
paths:
  /applications:
    get:
      consumes:
      - application/json
      description: 分页查询投递记录，可按岗位、候选人、简历、状态、来源和关键词筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 岗位名/候选人名/简历文件名关键词
        in: query
        name: keyword
        type: string
      - description: 岗位 ID
        in: query
        name: jobId
        type: integer
      - description: 候选人 ID
        in: query
        name: candidateId
        type: integer
      - description: 简历 ID
        in: query
        name: resumeId
        type: integer
      - description: 投递状态
        in: query
        name: status
        type: string
      - description: 投递来源
        in: query
        name: source
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 查询投递记录列表
      tags:
      - 投递记录
    post:
      consumes:
      - application/json
      description: 将简历投递到指定岗位，生成一条投递记录
      parameters:
      - description: 创建投递记录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 创建投递记录
      tags:
      - 投递记录
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱登录，返回 JWT token
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 用户登录
      tags:
      - 登录鉴权
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建用户并返回登录 token
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 用户注册
      tags:
      - 登录鉴权
  /candidate-statuses:
    get:
      consumes:
      - application/json
      description: 返回候选人/简历状态枚举，前端写死枚举时也应与这里保持一致
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 查询候选人状态枚举
      tags:
      - 候选人
  /candidates:
    get:
      consumes:
      - application/json
      description: 分页查询候选人，可按姓名、邮箱、手机号关键词、来源和状态筛选，并返回 positionCategoryId/positionCategoryName/currentJobId；source
        只接受 boss/email
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 姓名/邮箱/手机号关键词
        in: query
        name: keyword
        type: string
      - description: 候选人来源 boss/email
        in: query
        name: source
        type: string
      - description: 候选人状态
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 查询候选人列表
      tags:
      - 候选人
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: 创建候选人基础档案；支持 positionCategoryId/currentJobId 关联岗位分类和岗位；gender 只接受
        男/女，source 只接受 boss/email，highestEducation 只接受 专科/本科/硕士/博士；推荐使用 multipart/form-data
        同时上传 file 简历文件，兼容旧 JSON 创建
      parameters:
      - description: 创建候选人请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCandidateRequest'
      - description: 简历文件，multipart 创建时必传
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 创建候选人
      tags:
      - 候选人
  /candidates/{id}:
    put:
      consumes:
      - application/json
      - multipart/form-data
      description: 根据 ID 编辑候选人基础档案；支持 positionCategoryId/currentJobId 关联岗位分类和岗位；gender
        只接受 男/女，source 只接受 boss/email，highestEducation 只接受 专科/本科/硕士/博士
      parameters:
      - description: 候选人 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 编辑候选人请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCandidateRequest'
      - description: 新的简历文件，multipart 更新时可选
        in: formData
        name: file
        type: file
      - description: 简历原始文本
        in: formData
        name: rawText
        type: string
      - description: 简历语言
        in: formData
        name: language
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 编辑候选人
      tags:
      - 候选人
  /candidates/{id}/resume:
    post:
      consumes:
      - multipart/form-data
      description: 给已有候选人上传一份新的简历；列表会以最新简历作为展示和分析对象
      parameters:
      - description: 候选人 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 简历文件
        in: formData
        name: file
        required: true
        type: file
      - description: 简历原始文本
        in: formData
        name: rawText
        type: string
      - description: 简历语言
        in: formData
        name: language
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 给候选人上传/替换简历
      tags:
      - 候选人
  /candidates/batch-analyze:
    post:
      consumes:
      - application/json
      description: 按候选人 ID 批量创建分析任务；不传 jobId 时使用候选人最新简历已有投递岗位，传 jobId 时会为最新简历创建/复用投递记录
      parameters:
      - description: 批量分析请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.BatchAnalyzeCandidatesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 批量分析候选人简历
      tags:
      - 候选人
  /dashboard/summary:
    get:
      consumes:
