basePath: /api/v1
definitions:
  dto.CreateJobCategoryRequest:
    properties:
      description:
        type: string
      name:
        type: string
      parentId:
        type: integer
      sortOrder:
        type: integer
    required:
    - name
    type: object
  dto.LoginRequest:
    properties:
      account:
        type: string
      password:
        type: string
    required:
    - account
    - password
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 6
        type: string
      phone:
        maxLength: 30
        type: string
      realName:
        maxLength: 50
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  response.APIResponse:
    properties:
      code:
        type: integer
      data:
        description: interface{} → 这个字段类型不固定，啥都能放
      error:
        description: omitempty → 如果没值就别出现在 JSON 里，别占位置
      message:
        type: string
      requestId:
        type: string
      timestamp:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: AI 智能简历筛选系统后端接口文档
  title: AI Resume Screening API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用用户名或邮箱登录，返回 JWT token
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 用户登录
      tags:
      - 登录鉴权
  /auth/register:
    post:
      consumes:
      - application/json
      description: 创建用户并返回登录 token
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      summary: 用户注册
      tags:
      - 登录鉴权
  /job-categories:
    get:
      consumes:
      - application/json
      description: 分页查询岗位分类
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: pageSize
        type: integer
      - description: 关键词
        in: query
        name: keyword
        type: string
      - description: 状态 active/disabled
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 查询岗位分类列表
      tags:
      - 岗位分类
    post:
      consumes:
      - application/json
      description: 创建一个新的岗位分类，例如技术、客服/运营、产品
      parameters:
      - description: 创建岗位分类请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateJobCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: 创建岗位分类
      tags:
      - 岗位分类
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
